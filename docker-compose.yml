services:
  app:
    image: ghcr.io/windschord/claude-work:latest
    container_name: claudework
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - claudework-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # ネットワークフィルタリング機能でホストのiptablesを操作するための権限設定
    # nsenterでホストのネットワーク名前空間に入り、DOCKER-USERチェーンにフィルタルールを追加する
    # セキュリティ注意: これらの設定はコンテナからホストへのアクセス範囲を拡大する
    # 詳細: docs/sdd/design/network-filtering/components/iptables-manager.md
    # NET_ADMIN: iptablesルールの操作に必要
    # SYS_ADMIN: nsenterでホストの名前空間にアクセスするために必要
    # SYS_PTRACE: /proc/1/ns/netへのアクセスに必要
    pid: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_PTRACE
    security_opt:
      - apparmor=unconfined
    # nodeユーザーがdocker.sockにアクセスするため、ホストのdockerグループGIDを追加
    # デフォルト984は一般的な値だが、ホストにより異なる場合がある
    # 正確な値の取得: DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    group_add:
      - "${DOCKER_GID:-984}"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/claudework.db
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ALLOWED_PROJECT_DIRS=${ALLOWED_PROJECT_DIRS:-}
      # ボリュームマウント先と一致させる（Dockerfile ENVでも設定済み）
      - DATA_DIR=/data
      # docker.sockマウント環境ではDocker機能を有効化（レガシーUI互換）
      - DOCKER_ENABLED=true
      # アプリがDockerコンテナ内で動作していることを示すフラグ
      - RUNNING_IN_DOCKER=true
      # Docker Compose環境であることを示すフラグ（ネットワークフィルタリング方式の判定に使用）
      - COMPOSE_PROJECT=${COMPOSE_PROJECT_NAME:-claudework}
      # Docker環境内でもHOST環境を使用する場合はコメントを外す
      # - ALLOW_HOST_ENVIRONMENT=true
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  claudework-data:
