services:
  app:
    image: ghcr.io/windschord/claude-work:latest
    container_name: claudework
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - claudework-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # nodeユーザーがdocker.sockにアクセスするため、ホストのdockerグループGIDを追加
    # デフォルト984は一般的な値だが、ホストにより異なる場合がある
    # 正確な値の取得: DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    group_add:
      - "${DOCKER_GID:-984}"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/claudework.db
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ALLOWED_PROJECT_DIRS=${ALLOWED_PROJECT_DIRS:-}
      # ボリュームマウント先と一致させる（Dockerfile ENVでも設定済み）
      - DATA_DIR=/data
      # docker.sockマウント環境ではDocker機能を有効化（レガシーUI互換）
      - DOCKER_ENABLED=true
      # アプリがDockerコンテナ内で動作していることを示すフラグ
      - RUNNING_IN_DOCKER=true
      # Docker Compose環境であることを示すフラグ（ネットワークフィルタリング方式の判定に使用）
      - COMPOSE_PROJECT=${COMPOSE_PROJECT_NAME:-claudework}
      # Docker環境内でもHOST環境を使用する場合はコメントを外す
      # - ALLOW_HOST_ENVIRONMENT=true
      # network-filter-proxy Management API URL（securityプロファイル有効時のみ設定）
      - PROXY_API_URL=${PROXY_API_URL:-}
      # Registry Firewall API URL（securityプロファイル有効時のみ設定）
      - REGISTRY_FIREWALL_URL=${REGISTRY_FIREWALL_URL:-}
      # Registry Firewall API Token (認証用)
      - REGISTRY_FIREWALL_API_TOKEN=${REGISTRY_FIREWALL_API_TOKEN:-}
      # Claudeコンテナを接続するinternalネットワーク名
      - PROXY_NETWORK_NAME=${PROXY_NETWORK_NAME:-claudework-filter}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  registry-firewall:
    profiles: ["security"]
    # イメージタグは公開後に正式バージョンに更新する（現時点では正式リリース未公開のためlatestを使用）
    image: ghcr.io/windschord/registry-firewall:latest
    container_name: claudework-registry-firewall
    networks:
      - default
      - claudework-filter
    volumes:
      - registry-firewall-data:/data
      - ./configs/registry-firewall.yaml:/config/config.yaml:ro
    environment:
      - REGISTRY_FIREWALL_CONFIG=/config/config.yaml
      - RUST_LOG=${REGISTRY_FIREWALL_LOG_LEVEL:-info}
      # API認証トークン（appサービスのREGISTRY_FIREWALL_API_TOKENと共有）
      - REGISTRY_FIREWALL_API_TOKEN=${REGISTRY_FIREWALL_API_TOKEN:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  network-filter-proxy:
    profiles: ["security"]
    image: ghcr.io/windschord/network-filter-proxy:v0.1.0-rc.2
    container_name: claudework-filter-proxy
    networks:
      - default
      - claudework-filter
    environment:
      # 既知のセキュリティ制約: API_BIND_ADDR=0.0.0.0 により Management API (8080) が
      # claudework-filter ネットワーク側からも到達可能。Claudeコンテナが自身のルールを
      # 変更してフィルタをバイパスできる可能性がある。
      # 対策: upstream側でバインドアドレス制限またはトークン認証を追加予定。
      # 詳細: docs/sdd/design/network-filtering/components/docker-compose-proxy.md
      - API_BIND_ADDR=0.0.0.0
      - LOG_LEVEL=${FILTER_LOG_LEVEL:-info}
      - LOG_FORMAT=json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/filter-proxy", "healthcheck"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  claudework-data:
  registry-firewall-data:

networks:
  claudework-filter:
    # Docker Composeのプロジェクト名プレフィックスを付けず、PROXY_NETWORK_NAMEと同じ値を使用
    # 複数インスタンス運用時はPROXY_NETWORK_NAMEを変更してネットワーク名の衝突を回避する
    name: ${PROXY_NETWORK_NAME:-claudework-filter}
    internal: true
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
