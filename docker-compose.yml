services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claudework
    ports:
      - "${HOST_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    # nodeユーザーがdocker.sockにアクセスするため、ホストのdockerグループGIDを追加
    # DOCKER_GID の取得: DOCKER_GID=$(stat -c '%g' /var/run/docker.sock)
    group_add:
      - "${DOCKER_GID:-0}"
    env_file:
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/data/claudework.db
      - PORT=3000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-}
      - ALLOWED_PROJECT_DIRS=${ALLOWED_PROJECT_DIRS:-}
      # GIT_REPOS_PATH は将来の拡張用（現在はDATA_DIR/reposが使用される）
      - GIT_REPOS_PATH=${GIT_REPOS_PATH:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
