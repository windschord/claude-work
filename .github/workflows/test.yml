name: Test

on:
  push:
    branches: [ main, nodejs-architecture ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Lint job - runs quickly in parallel
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup
      with:
        skip-db-setup: 'true'

    - name: Run linter
      run: pnpm run lint

    - name: Install systemd-linter
      if: hashFiles('systemd/*.service') != ''
      uses: baptiste0928/cargo-install@v3
      with:
        crate: systemd-linter

    - name: Lint systemd unit files
      if: hashFiles('systemd/*.service') != ''
      run: systemd-linter systemd/*.service

  # Backend tests - API routes, services, libs
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: file:./data/test.db

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup

    - name: Run backend tests
      # Note: Vitest is NOT run in pre-commit (lint-staged "*.{ts,tsx}") due to a structural conflict:
      # ClaudeWork uses git worktrees internally, which causes `.git/index` errors when
      # lint-staged runs git stash during pre-commit. This CI job is the quality gate for tests.
      # Note: Some tests are excluded due to node-pty native module issues in CI environment.
      # Integration tests and PTY-related tests should be run locally.
      # See: https://github.com/windschord/claude-work/pull/96
      run: |
        pnpm exec vitest run src/app/api src/lib src/services src/bin \
          --exclude='**/*.integration.test.ts' \
          --exclude='**/docker-adapter.test.ts' \
          --exclude='**/docker-adapter-git.test.ts' \
          --exclude='src/services/__tests__/pty-session-manager.test.ts' \
          --reporter=verbose
      timeout-minutes: 8

  # Frontend tests - components, pages, hooks
  test-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: file:./data/test.db
      VITEST_FILE_PARALLELISM: 'true'

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup

    - name: Run frontend tests
      # Note: Vitest is NOT run in pre-commit (lint-staged "*.{ts,tsx}") due to a structural conflict:
      # ClaudeWork uses git worktrees internally, which causes `.git/index` errors when
      # lint-staged runs git stash during pre-commit. This CI job is the quality gate for tests.
      run: |
        # Run vitest with a 5-minute timeout - if it hangs after tests pass, timeout will kill it
        set +e
        timeout --signal=SIGKILL 300 pnpm exec vitest run src/components src/hooks src/store src/app --exclude='src/app/api/**' --reporter=verbose 2>&1 | tee vitest-output.txt
        VITEST_EXIT_CODE=$?

        # Check if tests passed (look for success message in output)
        if grep -q "Test Files.*passed" vitest-output.txt && ! grep -q "Test Files.*failed" vitest-output.txt; then
          echo "All tests passed"
          exit 0
        elif [ $VITEST_EXIT_CODE -eq 137 ]; then
          # SIGKILL timeout (128 + 9 = 137) - check if tests passed before hang
          if grep -q "Test Files.*passed" vitest-output.txt && ! grep -q "Test Files.*failed" vitest-output.txt; then
            echo "Tests passed but process hung - treating as success"
            exit 0
          fi
          echo "Tests may have failed or hung before completing"
          exit 1
        else
          exit $VITEST_EXIT_CODE
        fi
      timeout-minutes: 8

  # E2E tests - CLI installation tests (browser tests require Claude CLI)
  # Uses pre-built CLI package from build job to avoid redundant rebuild (~226s -> ~30s)
  test-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [build]

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup
      with:
        skip-db-setup: 'true'

    - name: Download CLI E2E package
      uses: actions/download-artifact@v4
      with:
        name: cli-e2e-package
        path: /tmp/cli-e2e-package/package

    - name: Link node_modules to CLI package
      run: ln -sf "$GITHUB_WORKSPACE/node_modules" /tmp/cli-e2e-package/package/node_modules

    - name: Verify CLI package
      run: |
        pkg=/tmp/cli-e2e-package/package
        ok=true
        for f in dist/src/bin/cli.js package.json .next/BUILD_ID; do
          if [ ! -s "$pkg/$f" ]; then
            echo "::error::Missing or empty required file: $pkg/$f"
            ok=false
          fi
        done
        for d in .next .next/static .next/server; do
          if [ ! -d "$pkg/$d" ]; then
            echo "::error::Missing required directory: $pkg/$d"
            ok=false
          elif [ "$d" != ".next" ] && ! find "$pkg/$d" -mindepth 1 -type f ! -name '.gitkeep' -print -quit | grep -q .; then
            echo "::error::Directory contains no build files: $pkg/$d"
            ok=false
          fi
        done
        if [ "$ok" != "true" ]; then
          echo "CLI package verification failed. Listing contents:"
          ls -laR "$pkg"
          exit 1
        fi
        echo "CLI package verified successfully"

    - name: Run CLI E2E tests
      run: SKIP_WEBSERVER=true CLI_PACKAGE_DIR=/tmp/cli-e2e-package/package pnpm exec playwright test --project=cli
      timeout-minutes: 5

  # Migration tests - verifies Drizzle migrate() with data-populated tables
  test-migration:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup
      with:
        skip-db-setup: 'true'

    - name: Run migration tests
      run: pnpm run test:migration

  # Build job - runs in parallel with lint/unit tests, required by test-e2e for CLI E2E package artifact
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      DATABASE_URL: file:./data/test.db

    steps:
    - uses: actions/checkout@v4

    - name: Setup project
      uses: ./.github/actions/setup

    - name: Build
      run: pnpm run build

    - name: Verify build outputs
      run: |
        for f in .next/BUILD_ID; do
          [ -s "$f" ] || { echo "::error::Missing or empty build output: $f"; exit 1; }
        done
        for d in .next/static .next/server; do
          [ -d "$d" ] || { echo "::error::Missing build output directory: $d"; exit 1; }
          [ -n "$(find "$d" -mindepth 1 -type f -print -quit)" ] || {
            echo "::error::Build output directory is empty: $d"
            exit 1
          }
        done

    - name: Create CLI E2E package
      run: |
        set -eo pipefail
        PKG=/tmp/cli-e2e-package/package
        mkdir -p "$PKG"
        # Copy only files needed for CLI E2E tests (skip npm pack for speed)
        cp package.json "$PKG/"
        cp -r dist "$PKG/"
        # Copy real Next.js build outputs
        mkdir -p "$PKG/.next"
        cp .next/BUILD_ID "$PKG/.next/"
        cp -r .next/static .next/server "$PKG/.next/"

    - name: Upload CLI E2E package
      uses: actions/upload-artifact@v4
      with:
        name: cli-e2e-package
        path: /tmp/cli-e2e-package/package
        include-hidden-files: true
        retention-days: 1

  # Mutation testing - runs only on PRs for changed files
  mutation-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'pull_request'

    env:
      DATABASE_URL: file:./data/test.db

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # diff計算のため

    - name: Setup project
      uses: ./.github/actions/setup

    - name: Get changed files for mutation testing
      id: changed-files
      run: |
        # PRのベースコミットとの差分から対象ファイルを取得（SHA指定で確実に動作）
        RAW_CHANGED_FILES=$(git diff --name-only --diff-filter=ACMR ${{ github.event.pull_request.base.sha }}...${{ github.sha }} -- \
          'src/services/**/*.ts' 'src/lib/**/*.ts') || {
          echo "::error::git diff failed while collecting mutation targets"
          exit 1
        }
        CHANGED_FILES=$(printf '%s\n' "$RAW_CHANGED_FILES" | \
          grep -Ev '(__tests__|\.test\.ts$|\.spec\.ts$)' || true)

        if [ -z "$CHANGED_FILES" ]; then
          echo "No mutation test target files changed"
          echo "has_targets=false" >> $GITHUB_OUTPUT
        else
          echo "Changed files for mutation testing:"
          echo "$CHANGED_FILES"
          # Stryker --mutate形式に変換 (カンマ区切り)
          MUTATE_TARGETS=$(echo "$CHANGED_FILES" | tr '\n' ',' | sed 's/,$//')
          echo "mutate_targets=$MUTATE_TARGETS" >> $GITHUB_OUTPUT
          echo "has_targets=true" >> $GITHUB_OUTPUT
        fi

    - name: Run mutation testing
      if: steps.changed-files.outputs.has_targets == 'true'
      run: |
        # 動的にmutate対象を指定してStrykerを実行
        # break: 85でスコア85%未満なら失敗
        # mutate_targetsはカンマ区切り文字列なので、そのまま--mutateに渡す
        pnpm exec stryker run \
          --mutate "${{ steps.changed-files.outputs.mutate_targets }}" \
          --reporters clear-text,progress
      timeout-minutes: 25

    - name: Report mutation score to summary
      if: always() && steps.changed-files.outputs.has_targets == 'true'
      run: |
        echo "## Mutation Testing Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Target files:** ${{ steps.changed-files.outputs.mutate_targets }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Threshold:** 85%" >> $GITHUB_STEP_SUMMARY

  # Final check - ensures all jobs passed
  ci-check:
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: [lint, test-backend, test-frontend, test-e2e, build, mutation-test, test-migration]
    if: always()

    steps:
    - name: Check all jobs passed
      run: |
        if [ "${{ needs.lint.result }}" != "success" ] || \
           [ "${{ needs.test-backend.result }}" != "success" ] || \
           [ "${{ needs.test-frontend.result }}" != "success" ] || \
           [ "${{ needs.test-e2e.result }}" != "success" ] || \
           [ "${{ needs.build.result }}" != "success" ] || \
           [ "${{ needs.test-migration.result }}" != "success" ]; then
          echo "One or more jobs failed"
          exit 1
        fi
        # mutation-test is only run on PRs, so skipped is acceptable
        if [ "${{ needs.mutation-test.result }}" != "success" ] && \
           [ "${{ needs.mutation-test.result }}" != "skipped" ]; then
          echo "Mutation test job failed"
          exit 1
        fi
        echo "All jobs passed successfully"
